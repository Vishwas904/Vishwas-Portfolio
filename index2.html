<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Box</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      .container {
        display: flex;
        justify-content: space-evenly;
        margin: 100px auto;
        background-color: rgb(0, 0, 0);
        height: 300px;
        width: 85%;
        padding: 50px;
      }
      .first {
        height: 50%;
        width: 50%;
        background-color: rgb(0, 0, 0);
        color: white;
        font-size: 3rem;
        margin: 0 45px;
      }
      .second {
        display: flex;
        width: 50%;
        font-size: 1.5rem;
        color: white;
        background-color: rgb(0, 0, 0);
        margin: 10px 100px;
        flex-direction: column;
        justify-content: space-around;
      }
      .btn button {
        padding: 10px 20px;
        margin: 10px 0px;
        font-size: 20px;
        font-weight: 500;

        /* background: transparent;
        border: 2px solid #00ffe9;
        color: #00b7a8; */
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="first">
        <div class="hi">Hi,</div>
        My name is Vishwas, I am a Web developer and UI designer.
      </div>
      <div class="second">
        <p>
          Lorem ipsum dolor sit amet consectetur adipisicing elit. Quas facere
          quam iusto! Reprehenderit alias iusto aliquam, exercitationem quod,
          debitis totam placeat voluptas, quasi id culpa dolor facere dolore.
          Fugiat, cupiditate.
        </p>
        <div class="btn">
          <button>READ MORE</button>
        </div>
      </div>
    </div>
  </body>
</html>
